<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AbdoulGame Ultimate Polyglot</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --p: #00f2ff;
            --s: #7000ff;
            --ai: #ff00c8;
            --success: #00ff88;
            --error: #ff3e3e;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 32px rgba(0, 242, 255, 0.1);
        }

        body.theme-classic {
            --p: #ffffff;
            --s: #444444;
            --bg: #111111;
            --shadow: 0 8px 32px rgba(255, 255, 255, 0.05);
        }

        body.theme-gold {
            --p: #ffcc00;
            --s: #aa8800;
            --bg: #0a0a05;
            --shadow: 0 8px 32px rgba(255, 204, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b, var(--bg));
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            transition: all 0.6s ease;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0e27, #1a0033, #0a0e27);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            animation: splashFadeIn 0.6s ease;
        }

        @keyframes splashFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .splash-logo {
            font-size: 120px;
            animation: splashPulse 2s ease-in-out infinite;
        }

        @keyframes splashPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .splash-title {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00f2ff, #7000ff, #ff00c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            letter-spacing: 2px;
            margin: 0;
        }

        .splash-subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            opacity: 0.8;
            margin: 0;
        }

        .loading-bar {
            width: clamp(200px, 70vw, 300px);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid var(--p);
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--p), var(--s), var(--ai));
            width: 0%;
            animation: loading 2.5s ease-in-out forwards;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--p);
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2);
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--p), var(--success));
            transition: 0.5s ease;
            box-shadow: 0 0 20px var(--p);
        }

        .top-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            margin-top: 6px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 10px;
        }

        .stat-badge {
            background: var(--glass);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid var(--p);
            font-weight: 900;
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .selection-preview {
            width: 100%;
            height: 40px;
            background: rgba(112,0,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--p);
            font-size: 1.15rem;
            border-bottom: 1px solid var(--s);
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .knowledge-banner {
            width: 92%;
            margin: 10px 0;
            padding: 18px;
            background: rgba(0, 242, 255, 0.08);
            border-radius: 18px;
            border: 1px solid var(--p);
            font-size: 0.95rem;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
            line-height: 1.6;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #game-board {
            margin: 10px;
            background: var(--glass);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: grid;
            gap: 6px;
            touch-action: none;
            transition: 0.4s;
            box-shadow: var(--shadow);
            flex-shrink: 1;
            overflow: auto;
        }

        .cell {
            width: clamp(34px, 9.5vw, 48px);
            height: clamp(34px, 9.5vw, 48px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.15rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
        }

        .cell.active {
            background: var(--s) !important;
            color: white;
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 0 15px var(--s);
        }

        .cell.found {
            background: var(--success) !important;
            color: #000;
            box-shadow: 0 0 20px var(--success);
            pointer-events: none;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--s), var(--p));
            color: white;
            padding: 14px 32px;
            border-radius: 20px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(112, 0, 255, 0.3);
            letter-spacing: 1px;
            font-size: 1rem;
        }

        #word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 12px;
            max-height: 80px;
            overflow-y: auto;
            width: 100%;
        }
    </style>
</head>
<body class="theme-neon">

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" aria-label="Pantalla de carga">
        <div class="splash-container">
            <div class="splash-logo">🔥</div>
            <h1 class="splash-title">AbdoulGame</h1>
            <p class="splash-subtitle">POLYGLOT ULTIMATE</p>
            <div class="loading-bar"><div class="loading-progress"></div></div>
            <p class="loading-text" id="loading-text">Cargando...</p>
        </div>
    </div>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="level-indicator">🎯 NIVEL <span id="level-num">1</span></div>
    <div class="combo-counter" style="display:none">🔥 RACHA: <span id="combo-count">0</span></div>

    <!-- START MODAL -->
    <div id="start-modal" class="modal" style="display: none;">
        <h1 style="font-size: 3.5rem; margin: 0; font-weight: 900; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ABDoulGAME</h1>
        <p id="txt-ver" style="opacity: 0.7; margin: 10px 0 30px 0;">v20.2 - POLYGLOT EDITION</p>
        <button class="btn-main" onclick="startApp()" id="txt-start-btn">ENTRAR</button>
    </div>

    <!-- SETTINGS MODAL (placeholder minimal) -->
    <div id="settings-modal" class="modal" style="display: none; background: rgba(0,0,0,0.9);">
        <h2 style="margin:0; color:var(--p)">AJUSTES</h2>
        <button class="btn-main" onclick="closeSettings()" style="margin-top:20px">CERRAR</button>
    </div>

    <!-- EXIT MODAL -->
    <div id="exit-modal" class="modal" style="display: none; background: rgba(0,0,0,0.95);">
        <h2 id="txt-exit-msg">¿SALIR?</h2>
        <div style="display:flex; gap:20px; flex-wrap: wrap; justify-content: center;">
            <button class="btn-main" onclick="exitGame()" style="background:var(--error)">SÍ</button>
            <button class="btn-main" onclick="toggleExit()">NO</button>
        </div>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <button style="background:none; border:none; color:var(--error); font-size:1.5rem; cursor:pointer;" onclick="toggleExit()">✖</button>
        <div class="stat-badge" id="timer-ui">⏱️ 02:00</div>
        <button style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="openSettings()">⚙️</button>
        <div class="stat-badge">⭐ <span id="score-ui">0</span></div>
    </div>

    <!-- GAME AREA -->
    <div class="selection-preview" id="selection-preview">...</div>
    <div class="knowledge-banner" id="knowledge-text">Preparando sabiduría...</div>
    <div id="game-board"></div>
    <div id="word-bank"></div>

    <!-- BUTTONS -->
    <div style="display:flex; gap:15px; margin-top:auto; padding-bottom:20px; flex-wrap: wrap; justify-content: center;">
        <button class="btn-main" onclick="triggerAIHint()" id="txt-hint-btn" style="font-size: 0.8rem;">🤖 PISTA</button>
        <button class="btn-main" onclick="clearSelection()" id="txt-clear-btn" style="background: var(--error); font-size: 0.8rem;">BORRAR</button>
    </div>

    <script>
        // ===== SPLASH: always close after 2.5s (no matter what) =====
        (function setupSplashFailsafe() {
            const splash = document.getElementById('splash-screen');
            const loadingText = document.getElementById('loading-text');

            function hideSplashScreen() {
                try {
                    if (!splash) return;
                    splash.classList.add('fade-out');
                    // remove after transition
                    setTimeout(() => {
                        try { splash.remove(); } catch (e) {}
                    }, 900);
                } catch (e) {}
            }

            // unconditional failsafe
            setTimeout(hideSplashScreen, 2500);

            // helpful status if init crashes
            window.addEventListener('error', () => {
                if (loadingText) loadingText.textContent = 'Error al cargar. Entrando…';
                setTimeout(hideSplashScreen, 800);
                showStartModal();
            });

            window.addEventListener('unhandledrejection', () => {
                if (loadingText) loadingText.textContent = 'Error al cargar. Entrando…';
                setTimeout(hideSplashScreen, 800);
                showStartModal();
            });

            function showStartModal() {
                const m = document.getElementById('start-modal');
                if (m) m.style.display = 'flex';
            }

            // minimal init: show start modal fast
            window.addEventListener('load', () => {
                try {
                    showStartModal();
                } catch (e) {
                    showStartModal();
                }
            });
        })();

        // ===== Minimal placeholders so buttons don't throw =====
        function startApp() {
            const m = document.getElementById('start-modal');
            if (m) m.style.display = 'none';
            document.getElementById('knowledge-text').textContent = 'Listo. ¡A jugar!';
        }

        function openSettings() {
            const m = document.getElementById('settings-modal');
            if (m) m.style.display = 'flex';
        }

        function closeSettings() {
            const m = document.getElementById('settings-modal');
            if (m) m.style.display = 'none';
        }

        function toggleExit() {
            const m = document.getElementById('exit-modal');
            if (!m) return;
            m.style.display = (m.style.display === 'none' || !m.style.display) ? 'flex' : 'none';
        }

        function exitGame() {
            location.reload();
        }

        function triggerAIHint() {}
        function clearSelection() {
            const p = document.getElementById('selection-preview');
            if (p) p.textContent = '...';
        }
    </script>
</body>
</html>
