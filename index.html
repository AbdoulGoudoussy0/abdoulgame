<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AbdoulGame Ultimate Polyglot</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --p: #00f2ff; 
            --s: #7000ff; 
            --ai: #ff00c8; 
            --success: #00ff88; 
            --error: #ff3e3e; 
            --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 32px rgba(0, 242, 255, 0.1);
        }
        
        body.theme-classic { 
            --p: #ffffff; 
            --s: #444444; 
            --bg: #111111;
            --shadow: 0 8px 32px rgba(255, 255, 255, 0.05);
        }
        
        body.theme-gold { 
            --p: #ffcc00; 
            --s: #aa8800; 
            --bg: #0a0a05;
            --shadow: 0 8px 32px rgba(255, 204, 0, 0.08);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }
        
        body {
            font-family: 'Outfit', sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b, var(--bg));
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
            user-select: none;
            transition: all 0.6s ease;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0e27, #1a0033, #0a0e27);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            animation: splashFadeIn 0.6s ease;
        }

        @keyframes splashFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .splash-logo {
            font-size: 120px;
            animation: splashPulse 2s ease-in-out infinite;
        }

        @keyframes splashPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .splash-title {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00f2ff, #7000ff, #ff00c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            letter-spacing: 2px;
            margin: 0;
        }

        .splash-subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            opacity: 0.8;
            margin: 0;
        }

        .loading-bar {
            width: clamp(200px, 70vw, 300px);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid var(--p);
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--p), var(--s), var(--ai));
            width: 0%;
            animation: loading 2.5s ease-in-out forwards;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--p);
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        .progress-container { 
            width: 100%; 
            height: 6px; 
            background: rgba(255,255,255,0.1); 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 1000; 
            box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2);
        }

        #progress-bar { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(to right, var(--p), var(--success)); 
            transition: 0.5s ease;
            box-shadow: 0 0 20px var(--p);
        }

        .top-bar { 
            width: 100%; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.6); 
            margin-top: 6px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 10px;
        }

        .stat-badge { 
            background: var(--glass); 
            padding: 8px 14px; 
            border-radius: 12px; 
            border: 1px solid var(--p); 
            font-weight: 900; 
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        
        .selection-preview { 
            width: 100%; 
            height: 40px; 
            background: rgba(112,0,255,0.15); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            color: var(--p); 
            font-size: 1.15rem; 
            border-bottom: 1px solid var(--s); 
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .knowledge-banner { 
            width: 92%; 
            margin: 10px 0; 
            padding: 18px; 
            background: rgba(0, 242, 255, 0.08); 
            border-radius: 18px; 
            border: 1px solid var(--p); 
            font-size: 0.95rem; 
            text-align: center;
            min-height: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
            line-height: 1.6;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #game-board { 
            margin: 10px; 
            background: var(--glass); 
            padding: 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: grid; 
            gap: 6px; 
            touch-action: none; 
            transition: 0.4s;
            box-shadow: var(--shadow);
            flex-shrink: 1;
            overflow: auto;
        }
        
        .cell { 
            width: clamp(34px, 9.5vw, 48px); 
            height: clamp(34px, 9.5vw, 48px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 1.15rem; 
            border-radius: 8px; 
            background: rgba(255,255,255,0.05); 
            color: #cbd5e1; 
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
        }

        .cell:hover {
            background: rgba(255,255,255,0.08);
        }

        .cell.active { 
            background: var(--s) !important; 
            color: white; 
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 0 15px var(--s);
        }

        .cell.found { 
            background: var(--success) !important; 
            color: #000; 
            box-shadow: 0 0 20px var(--success);
            animation: foundPulse 0.6s ease;
            pointer-events: none;
        }

        @keyframes foundPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .modal { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
            text-align: center; 
            padding: 20px;
            backdrop-filter: blur(5px);
            overflow-y: auto;
        }
        
        .settings-card { 
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(30px); 
            border: 2px solid var(--p); 
            border-radius: 35px; 
            width: 95%; 
            max-width: 480px; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .setting-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding: 12px 0; 
            font-weight: 600;
            gap: 10px;
            flex-wrap: wrap;
        }

        .setting-item:last-of-type {
            border-bottom: none;
        }
        
        .btn-toggle { 
            background: var(--glass); 
            border: 1.5px solid var(--p); 
            color: white; 
            padding: 10px 16px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            min-width: 90px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .btn-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-toggle.active { 
            background: var(--success) !important; 
            color: #000 !important; 
            border-color: var(--success) !important;
            box-shadow: 0 0 20px var(--success);
        }

        .btn-main { 
            background: linear-gradient(135deg, var(--s), var(--p)); 
            color: white; 
            padding: 14px 32px; 
            border-radius: 20px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(112, 0, 255, 0.3);
            letter-spacing: 1px;
            font-size: 1rem;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(112, 0, 255, 0.5);
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .word-tag { 
            padding: 8px 14px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            font-size: 0.9rem; 
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: default;
            white-space: nowrap;
        }

        .word-tag:hover:not(.done) {
            background: rgba(255,255,255,0.1);
            border-color: var(--p);
        }

        .word-tag.done { 
            background: var(--success); 
            color: #000; 
            opacity: 0.4; 
            text-decoration: line-through;
            animation: wordFoundAnim 0.6s ease;
        }

        @keyframes wordFoundAnim {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 0.4; }
        }

        #vol-slider {
            width: 140px;
            cursor: pointer;
            accent-color: var(--p);
            flex-shrink: 0;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: #000;
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: 900;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow);
        }

        @keyframes slideInRight {
            from { transform: translateX(200px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(200px); opacity: 0; }
        }

        .save-indicator.hide {
            animation: slideOutRight 0.3s ease;
        }

        .level-indicator {
            position: fixed;
            top: 70px;
            left: 20px;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--p);
            font-weight: 900;
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            z-index: 999;
        }

        .combo-counter {
            position: fixed;
            top: 70px;
            right: 20px;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--ai);
            font-weight: 900;
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            color: var(--ai);
            z-index: 999;
        }

        .combo-counter.active {
            animation: comboPulse 0.3s ease;
            box-shadow: 0 0 20px var(--ai);
        }

        @keyframes comboPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #word-bank {
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 12px;
            max-height: 80px;
            overflow-y: auto;
            width: 100%;
        }

        @media (max-width: 479px) {
            .stat-badge { padding: 6px 10px; font-size: 0.75rem; }
            .top-bar { padding: 10px 12px; gap: 5px; }
            .cell { width: clamp(28px, 8vw, 40px); height: clamp(28px, 8vw, 40px); }
        }
    </style>
</head>
