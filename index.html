<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AbdoulGame Infinity Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8065/8065416.png">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --p: #00f2ff; --s: #7000ff; --ai: #ff00c8; --success: #00ff88; --error: #ff3e3e; --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body.theme-classic { --p: #ffffff; --s: #444444; --bg: #111111; --ai: #888; }
        body.theme-gold { --p: #ffcc00; --s: #aa8800; --bg: #0a0a05; --ai: #ffd700; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            font-family: 'Outfit', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b, var(--bg));
            color: white; margin: 0; display: flex; flex-direction: column;
            align-items: center; height: 100dvh; overflow: hidden; user-select: none;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- BARRA DE PROGRESO MODERNA --- */
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); position: fixed; top: 0; left: 0; z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(to right, var(--p), var(--success)); box-shadow: 0 0 15px var(--p); transition: width 0.5s ease; }

        .top-bar { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); margin-top: 6px; }
        .stat-badge { background: var(--glass); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--p); font-weight: 900; font-size: 0.9rem; }
        
        .knowledge-banner { 
            width: 92%; margin: 10px 0; padding: 15px; background: rgba(0, 242, 255, 0.08); 
            border-radius: 18px; border: 1px solid var(--p); font-size: 0.85rem; text-align: center;
            min-height: 70px; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
        }

        #game-board { 
            margin: 10px; background: var(--glass); padding: 8px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); display: grid; gap: 5px; 
            touch-action: none; transition: transform 0.4s ease;
        }

        .cell { 
            width: clamp(34px, 9.5vw, 48px); height: clamp(34px, 9.5vw, 48px); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.15rem; border-radius: 8px; 
            background: rgba(255,255,255,0.05); color: #cbd5e1; 
            transition: 0.15s; cursor: pointer;
        }
        .cell.active { background: var(--s) !important; color: white; transform: scale(1.15); box-shadow: 0 0 20px var(--s); z-index: 10; }
        .cell.found { background: var(--success) !important; color: #000; box-shadow: 0 0 12px var(--success); transform: scale(1); }

        /* --- SETTINGS MODAL --- */
        .modal { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .settings-card { 
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(30px); 
            border: 2px solid var(--p); border-radius: 35px; width: 95%; max-width: 450px; 
            padding: 25px; display: flex; flex-direction: column; gap: 18px;
        }
        .setting-item { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; }
        .btn-toggle { background: var(--glass); border: 1px solid var(--p); color: white; padding: 8px 14px; border-radius: 12px; font-weight: 900; cursor: pointer; min-width: 90px; }
        .btn-toggle.active { background: var(--p); color: #000; }

        .btn-main { background: linear-gradient(135deg, var(--s), var(--p)); color: white; padding: 16px 35px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3); }
        
        .word-tag { padding: 5px 12px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        .word-tag.done { background: var(--success); color: #000; opacity: 0.3; text-decoration: line-through; }
    </style>
</head>
<body class="theme-neon">

    <div class="progress-container"><div id="progress-bar"></div></div>

    <!-- Pantalla Inicial -->
    <div id="start-modal" class="modal">
        <h1 style="font-size: 3.5rem; margin: 0; font-weight: 900; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ABDOULGAME</h1>
        <p style="opacity: 0.7; margin-bottom: 40px;">INFINITY PRO v13.0</p>
        <button class="btn-main" onclick="startApp()" id="txt-start-btn">ENTRAR AL ESTADIO</button>
    </div>

    <!-- Centro de Control -->
    <div id="settings-modal" class="modal" style="display: none; background: rgba(0,0,0,0.9);">
        <div class="settings-card">
            <h2 id="txt-settings-title" style="margin: 0; color: var(--p); font-size: 2rem;">SETTINGS</h2>
            <div class="setting-item"><span>VOLUMEN</span><input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateAudio()"></div>
            <div class="setting-item"><span>IDIOMA</span><button class="btn-toggle" onclick="toggleLang()" id="lang-val">🇪🇸</button></div>
            <div class="setting-item"><span>TEMA</span><button class="btn-toggle" onclick="toggleTheme()" id="theme-val">NEON</button></div>
            <div class="setting-item"><span>VIBRACIÓN</span><button class="btn-toggle active" onclick="toggleVib()" id="vib-val">ON</button></div>
            <button class="btn-main" onclick="closeSettings()" id="txt-close">GUARDAR</button>
        </div>
    </div>

    <!-- UI Superior -->
    <div class="top-bar">
        <button class="btn-icon" style="background:none; border:none; color:var(--error); font-size:1.5rem; cursor:pointer;" onclick="location.reload()">✖</button>
        <div class="stat-badge" id="timer-ui">⏱️ 02:00</div>
        <button class="btn-icon" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="openSettings()">⚙️</button>
        <div class="stat-badge">⭐ <span id="score-ui">0</span></div>
    </div>

    <div class="knowledge-banner" id="knowledge-text">Preparando sabiduría...</div>

    <div id="game-board"></div>
    <div id="word-bank" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px;"></div>

    <div style="display:flex; gap:15px; margin-top:auto; padding-bottom:20px;">
        <button class="btn-main" onclick="triggerAIHint()" style="font-size: 0.8rem;">🤖 PISTA</button>
        <button class="btn-main" onclick="clearSelection()" style="background: var(--error); font-size: 0.8rem;">BORRAR</button>
    </div>

    <div id="win-modal" class="modal" style="display: none;">
        <h2 style="font-size: 4rem; color: var(--success); margin: 0;">¡GOOOOL!</h2>
        <p id="win-msg" style="margin-bottom: 25px; font-size: 1.2rem;"></p>
        <button class="btn-main" onclick="nextLevel()">SIGUIENTE NIVEL</button>
    </div>

    <audio id="bg-stadium" loop src="https://cdn.pixabay.com/audio/2022/02/22/audio_d0c6ff1101.mp3"></audio>
    <audio id="snd-goal" src="https://www.myinstants.com/media/sounds/gol-de-messi.mp3"></audio>
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>

    <script>
        const KNOWLEDGE_DB = [
            { w: "VIRTUD", info: { ES: "La virtud es la fuerza del alma.", EN: "Virtue is the soul's strength." }},
            { w: "ETICA", info: { ES: "La ética es el arte de vivir bien.", EN: "Ethics is the art of living well." }},
            { w: "HONOR", info: { ES: "Tu honor define tu integridad.", EN: "Honor defines your integrity." }},
            { w: "LOGICA", info: { ES: "La lógica es la base de la verdad.", EN: "Logic is the basis of truth." }},
            { w: "GENIO", info: { ES: "El genio es 1% talento y 99% trabajo.", EN: "Genius is 1% talent, 99% work." }},
            { w: "CODIGO", info: { ES: "El código es el lenguaje del futuro.", EN: "Code is the future's language." }},
            { w: "VALOR", info: { ES: "El valor vence al miedo.", EN: "Courage overcomes fear." }},
            { w: "MENTE", info: { ES: "Una mente abierta lo aprende todo.", EN: "An open mind learns everything." }},
            { w: "SABIO", info: { ES: "El sabio escucha antes de hablar.", EN: "The wise man listens before speaking." }},
            { w: "EXITO", info: { ES: "El éxito es persistir sin desanimarse.", EN: "Success is persisting without giving up." }}
        ];

        let config = { lang: 'ES', theme: 'NEON', vib: true, vol: 0.5, score: 0, currentLvl: 1 };
        let foundWords = [], matrix = [], wordCoords = {}, selection = [], isSwiping = false, timeLeft = 120, timerInterval;

        function startApp() {
            document.getElementById('start-modal').style.display = 'none';
            updateAudio();
            document.getElementById('bg-stadium').play();
            loadLevel();
        }

        // --- MOTOR HÍBRIDO INTELIGENTE ---
        function handleCellInteraction(el, type) {
            if(el.classList.contains('found')) return;

            if(type === 'down') {
                isSwiping = true;
                processCell(el);
            } else if(type === 'enter' && isSwiping) {
                processCell(el);
            }
        }

        function processCell(el) {
            if(!selection.includes(el)) {
                el.classList.add('active');
                selection.push(el);
                if(config.vib && navigator.vibrate) navigator.vibrate(15);
                checkMatch();
            } else if(!isSwiping) { // Si es un tap sobre uno ya seleccionado, lo quita
                el.classList.remove('active');
                selection = selection.filter(i => i !== el);
            }
        }

        function checkMatch() {
            const cur = selection.map(c => c.innerText).join('');
            const rev = cur.split('').reverse().join('');
            const found = Object.keys(wordCoords).find(w => (w === cur || w === rev) && !foundWords.includes(w));
            
            if(found) {
                foundWords.push(found);
                selection.forEach(c => { c.classList.remove('active'); c.classList.add('found'); });
                document.getElementById('tag-'+found).classList.add('done');
                document.getElementById('snd-correct').play();
                const data = KNOWLEDGE_DB.find(d => d.w === found);
                document.getElementById('knowledge-text').innerText = "💡 " + (data ? data.info[config.lang] : found);
                config.score += 200;
                document.getElementById('score-ui').innerText = config.score;
                selection = [];
                updateProgress();
                if(foundWords.length === Object.keys(wordCoords).length) triggerWin();
            }
        }

        // --- PROGRESIÓN Y NIVELES ---
        function loadLevel() {
            const size = Math.min(8 + config.currentLvl, 12);
            const wordsToUse = KNOWLEDGE_DB.slice(0, 3 + config.currentLvl);
            
            foundWords = []; wordCoords = {}; selection = []; timeLeft = 120;
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('game-board').style.transform = "scale(0.5)";
            
            generateBoard(size, wordsToUse.map(d => d.w));
            renderBoard(size);
            setTimeout(() => { document.getElementById('game-board').style.transform = "scale(1)"; }, 100);
            updateProgress();
            startTimer();
        }

        function updateProgress() {
            const total = Object.keys(wordCoords).length;
            const percent = (foundWords.length / total) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function generateBoard(size, words) {
            let placed = false;
            while(!placed) {
                matrix = Array(size).fill().map(() => Array(size).fill(''));
                placed = true;
                for(let word of words) {
                    if(!placeWord(word, size)) { placed = false; break; }
                }
            }
            for(let r=0; r<size; r++) for(let c=0; c<size; c++)
                if(!matrix[r][c]) matrix[r][c] = String.fromCharCode(65 + Math.floor(Math.random()*26));
        }

        function placeWord(word, size) {
            const dirs = [[0,1], [1,0], [1,1], [1,-1]];
            for(let i=0; i<150; i++) {
                const d = dirs[Math.floor(Math.random()*dirs.length)];
                const r = Math.floor(Math.random()*size), c = Math.floor(Math.random()*size);
                if(canPlace(word, r, c, d, size)) {
                    wordCoords[word] = [];
                    for(let j=0; j<word.length; j++) {
                        const nr = r + j*d[0], nc = c + j*d[1];
                        matrix[nr][nc] = word[j];
                        wordCoords[word].push({r: nr, c: nc});
                    }
                    return true;
                }
            }
            return false;
        }

        function canPlace(w, r, c, d, s) {
            for(let i=0; i<w.length; i++) {
                let nr = r + i*d[0], nc = c + i*d[1];
                if(nr < 0 || nr >= s || nc < 0 || nc >= s) return false;
                if(matrix[nr][nc] !== '' && matrix[nr][nc] !== w[i]) return false;
            }
            return true;
        }

        function renderBoard(size) {
            const b = document.getElementById('game-board');
            b.innerHTML = '';
            b.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    const el = document.createElement('div');
                    el.className = 'cell'; el.innerText = matrix[r][c];
                    el.onpointerdown = (e) => { handleCellInteraction(el, 'down'); el.releasePointerCapture(e.pointerId); };
                    el.onpointerenter = () => { handleCellInteraction(el, 'enter'); };
                    b.appendChild(el);
                }
            }
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            Object.keys(wordCoords).forEach(w => bank.innerHTML += `<div class="word-tag" id="tag-${w}">${w}</div>`);
            window.onpointerup = () => { isSwiping = false; };
        }

        // --- AJUSTES Y AUDIO ---
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function updateAudio() {
            config.vol = document.getElementById('vol-slider').value;
            document.getElementById('bg-stadium').volume = config.vol * 0.2;
            document.getElementById('snd-goal').volume = config.vol;
            document.getElementById('snd-correct').volume = config.vol;
        }
        function toggleLang() { config.lang = config.lang === 'ES' ? 'EN' : 'ES'; document.getElementById('lang-val').innerText = config.lang === 'ES' ? '🇪🇸' : '🇺🇸'; }
        function toggleTheme() {
            const themes = ['NEON', 'CLASSIC', 'GOLD'];
            config.theme = themes[(themes.indexOf(config.theme) + 1) % themes.length];
            document.getElementById('theme-val').innerText = config.theme;
            document.body.className = 'theme-' + config.theme.toLowerCase();
        }
        function toggleVib() { config.vib = !config.vib; document.getElementById('vib-val').innerText = config.vib ? 'ON' : 'OFF'; }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60).toString().padStart(2,'0');
                let s = (timeLeft%60).toString().padStart(2,'0');
                document.getElementById('timer-ui').innerText = `⏱️ ${m}:${s}`;
                if(timeLeft <= 0) location.reload();
            }, 1000);
        }

        function triggerAIHint() {
            if(config.score < 100) return;
            config.score -= 100; document.getElementById('score-ui').innerText = config.score;
            const pending = Object.keys(wordCoords).find(w => !foundWords.includes(w));
            wordCoords[pending].forEach(p => {
                const el = document.querySelector(`.cell[data-r="${p.r}"][data-c="${p.c}"]`); // Nota: aquí corregir el selector si fuera necesario
                // El hint ahora simplemente busca letras del tablero que coincidan
                document.querySelectorAll('.cell').forEach(c => {
                    if(wordCoords[pending].some(pos => matrix[pos.r][pos.c] === c.innerText)) {
                         c.style.boxShadow = "0 0 20px var(--ai)";
                         setTimeout(() => c.style.boxShadow = "", 2000);
                    }
                });
            });
        }

        function triggerWin() {
            clearInterval(timerInterval);
            document.getElementById('snd-goal').play();
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => { document.getElementById('win-modal').style.display = 'flex'; }, 1000);
        }

        function clearSelection() {
            selection.forEach(c => c.classList.remove('active'));
            selection = [];
        }

        function nextLevel() { config.currentLvl++; loadLevel(); }
    </script>
</body>
</html>
